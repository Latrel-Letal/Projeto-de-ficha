<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha — Jujutsu Kaisen RPG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:          #0a0a0f;
    --bg2:         #11111a;
    --bg3:         #1a1a28;
    --border:      #2a2a40;
    --border2:     #3a3a55;
    --blue:        #4a9eff;
    --blue-glow:   rgba(74,158,255,0.15);
    --red:         #ff4a4a;
    --red-glow:    rgba(255,74,74,0.15);
    --purple:      #a855f7;
    --purple-glow: rgba(168,85,247,0.15);
    --gold:        #f0c040;
    --text:        #e0e0f0;
    --text2:       #8888aa;
    --online:      #22c55e;
    --radius:      10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    gap: 10px;
    flex-wrap: wrap;
  }
  .app-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--gold);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .session-info {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .online-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--online);
    box-shadow: 0 0 6px var(--online);
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  .btn-header {
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    background: transparent;
  }
  .btn-header.dice {
    border-color: var(--purple);
    color: var(--purple);
  }
  .btn-header.dice:hover { background: var(--purple); color: white; }
  .btn-header.toggle {
    border-color: var(--border2);
    color: var(--text2);
  }
  .btn-header.toggle:hover { border-color: var(--blue); color: var(--blue); }
  .btn-header.toggle.active { border-color: var(--blue); color: var(--blue); background: var(--blue-glow); }

  /* ── SELECT SCREEN ── */
  .player-select-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 28px;
    padding: 40px 20px;
  }
  .player-select-title {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: var(--gold);
    letter-spacing: 4px;
    text-align: center;
  }
  .player-select-subtitle {
    color: var(--text2);
    text-align: center;
    margin-top: -18px;
    font-size: 13px;
  }
  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    max-width: 680px;
    width: 100%;
  }
  .player-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .player-card:hover { border-color: var(--purple); box-shadow: 0 0 18px var(--purple-glow); transform: translateY(-2px); }
  .player-card.new-card { border-style: dashed; border-color: var(--border2); }
  .player-card.new-card:hover { border-color: var(--gold); box-shadow: 0 0 18px rgba(240,192,64,0.15); }
  .player-card.new-card .slot-name { color: var(--gold); }
  .btn-delete-ficha {
    margin-top: 10px;
    background: transparent;
    border: 1px solid rgba(255,74,74,0.4);
    color: var(--red);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-delete-ficha:hover { background: var(--red); color: white; }
  .player-card .slot-name { font-family: 'Cinzel', serif; font-size: 14px; color: var(--text); margin-bottom: 5px; }
  .player-card .slot-status { font-size: 11px; color: var(--text2); }
  .player-card.occupied .slot-status { color: var(--online); }
  .session-id-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 22px;
    text-align: center;
    max-width: 380px;
    width: 100%;
  }
  .session-id-box label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 8px; letter-spacing: 1px; }
  .session-id-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
  }
  .session-id-box input:focus { border-color: var(--purple); }
  .btn-enter {
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 11px 28px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    transition: opacity 0.2s;
    letter-spacing: 1px;
  }
  .btn-enter:hover { opacity: 0.85; }

  /* ── MAIN LAYOUT ── */
  .main-layout { display: none; }
  .main-layout.visible { display: flex; align-items: flex-start; }

  /* ── FICHAS AREA ── */
  .fichas-area {
    flex: 1;
    min-width: 0;
    transition: all 0.3s;
  }
  .fichas-area.collapsed {
    flex: 0 0 0;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    width: 0;
    padding: 0;
  }
  .fichas-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 18px;
    padding: 20px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── FICHA CARD ── */
  .ficha-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .ficha-card.is-mine { border-color: var(--purple); box-shadow: 0 0 28px var(--purple-glow); }
  .ficha-card.is-mine .card-header { background: linear-gradient(135deg,#1e1030,#16101e); }
  .card-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header-left { flex: 1; min-width: 0; }
  .char-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--gold);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .char-name[contenteditable="true"]:focus { outline: 1px solid var(--gold); border-radius: 3px; padding: 2px 4px; }
  .char-meta { font-size: 10px; color: var(--text2); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .char-meta span { display: flex; align-items: center; gap: 3px; }
  .char-meta [contenteditable="true"]:focus { outline: 1px solid var(--border2); border-radius: 3px; padding: 1px 3px; color: var(--text); }
  .player-badge {
    font-size: 10px;
    background: var(--purple-glow);
    border: 1px solid var(--purple);
    color: var(--purple);
    border-radius: 20px;
    padding: 3px 9px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .player-badge.other { background: var(--blue-glow); border-color: var(--blue); color: var(--blue); }

  .card-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 14px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── BARS ── */
  .resource-bars { display: flex; flex-direction: column; gap: 8px; }
  .resource-row { display: flex; align-items: center; gap: 8px; }
  .resource-label { font-size: 10px; font-weight: 600; width: 26px; text-align: right; flex-shrink: 0; }
  .resource-label.pv  { color: var(--red); }
  .resource-label.ea  { color: var(--blue); }
  .resource-label.pvt { color: var(--gold); }
  .bar-track { flex: 1; height: 11px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .bar-fill.pv  { background: linear-gradient(90deg,#7f1d1d,var(--red)); }
  .bar-fill.ea  { background: linear-gradient(90deg,#1e3a6e,var(--blue)); }
  .bar-fill.pvt { background: linear-gradient(90deg,#78350f,var(--gold)); }
  .resource-inputs { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
  .num-input {
    width: 42px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 3px 2px;
    outline: none;
  }
  .num-input:focus { border-color: var(--border2); }
  .num-sep { color: var(--text2); font-size: 11px; }

  /* ── ATTRS ── */
  .attrs-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; }
  .attr-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 7px 3px; text-align: center; }
  .attr-abbr { font-size: 9px; font-weight: 600; color: var(--text2); letter-spacing: 1px; }
  .attr-val { font-size: 17px; font-weight: 700; color: var(--text); display: block; line-height: 1.2; }
  .attr-val[contenteditable="true"]:focus { outline: 1px solid var(--border2); border-radius: 3px; }
  .attr-mod { font-size: 10px; color: var(--text2); margin-top: 1px; }

  /* ── INICIATIVA BTN ── */
  .btn-iniciativa {
    width: 100%;
    margin-top: 8px;
    background: linear-gradient(135deg,#1a1030,#12092a);
    border: 1px solid var(--purple);
    color: var(--purple);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .btn-iniciativa:hover { background: var(--purple); color: white; box-shadow: 0 0 18px var(--purple-glow); }
  .btn-iniciativa:active { transform: scale(0.98); }

  /* ── STATUS GRID ── */
  .status-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
  .status-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px; text-align: center; }
  .status-box .s-label { font-size: 9px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
  .status-box .s-val { font-size: 19px; font-weight: 700; color: var(--text); display: block; margin-top: 2px; }
  .status-box .s-val[contenteditable="true"]:focus { outline: 1px solid var(--border2); border-radius: 3px; }

  /* ── TÉCNICAS ── */
  .tecnicas-list { display: flex; flex-direction: column; gap: 5px; }
  .tecnica-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; display: flex; flex-direction: column; gap: 2px; }
  .tecnica-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .tecnica-nome { font-size: 12px; font-weight: 600; color: var(--text); }
  .tecnica-custo { font-size: 10px; font-weight: 700; color: var(--blue); background: rgba(74,158,255,0.1); border: 1px solid rgba(74,158,255,0.3); border-radius: 20px; padding: 2px 7px; white-space: nowrap; }
  .tecnica-efeito { font-size: 10px; color: var(--text2); }
  .tecnica-desc { font-size: 10px; color: var(--text2); font-style: italic; }
  .tecnica-nome[contenteditable="true"]:focus,
  .tecnica-custo[contenteditable="true"]:focus,
  .tecnica-efeito[contenteditable="true"]:focus,
  .tecnica-desc[contenteditable="true"]:focus {
    outline: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 3px;
    color: var(--text);
  }

  /* ── DOMÍNIO ── */
  .dominio-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 9px; padding: 12px; }
  .dominio-box.expansao { border-color: rgba(168,85,247,0.5); background: linear-gradient(135deg,#0f0a1a,#160e22); }
  .dominio-box.simples  { border-color: rgba(74,158,255,0.4); background: linear-gradient(135deg,#0a0f1a,#0e1622); }
  .dominio-title { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
  .dominio-box.expansao .dominio-title { color: var(--purple); }
  .dominio-box.simples  .dominio-title { color: var(--blue); }
  .dominio-desc { font-size: 10px; color: var(--text2); line-height: 1.5; }
  .dominio-desc[contenteditable="true"]:focus,
  .dominio-efeito[contenteditable="true"]:focus {
    outline: 1px solid var(--border2);
    border-radius: 4px;
    padding: 2px 4px;
  }
  .dominio-efeito { margin-top: 7px; font-size: 10px; color: var(--text); background: rgba(255,255,255,0.04); border-radius: 5px; padding: 7px 9px; line-height: 1.5; }

  /* ════════════════════════════════════
     PAINEL DIREITO (INICIATIVA + CHAT)
  ════════════════════════════════════ */
  .right-panel {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 53px);
    position: sticky;
    top: 53px;
    border-left: 1px solid var(--border);
    background: var(--bg2);
  }

  /* ── ORDEM DE INICIATIVA ── */
  .initiative-panel {
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    flex-shrink: 0;
  }
  .initiative-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .initiative-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-clear-init {
    font-size: 10px;
    color: var(--text2);
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear-init:hover { color: var(--red); border-color: var(--red); }

  .initiative-list { display: flex; flex-direction: column; gap: 4px; }
  .init-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    transition: all 0.3s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
  .init-row.first {
    border-color: var(--gold);
    background: linear-gradient(135deg,#1a1400,#120f00);
  }
  .init-row.second { border-color: rgba(168,85,247,0.5); }
  .init-rank {
    font-size: 10px;
    font-weight: 700;
    color: var(--text2);
    width: 16px;
    text-align: center;
  }
  .init-row.first .init-rank { color: var(--gold); }
  .init-score {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .init-row.first .init-score { color: var(--gold); }
  .init-name { font-size: 11px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .init-nat {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 700;
  }
  .init-nat.crit { background: rgba(34,197,94,0.15); color: var(--online); border: 1px solid rgba(34,197,94,0.3); }
  .init-nat.fail { background: var(--red-glow); color: var(--red); border: 1px solid rgba(255,74,74,0.3); }
  .init-empty { text-align: center; font-size: 11px; color: var(--text2); font-style: italic; padding: 8px 0; }

  /* ── CHAT ── */
  .chat-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text2);
    flex-shrink: 0;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .chat-msg {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 9px;
    font-size: 11px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
  .chat-msg.system { border-color: rgba(168,85,247,0.3); background: linear-gradient(135deg,#0f0a1a,#1a1030); text-align: center; color: var(--text2); font-style: italic; }
  .chat-msg.roll { border-color: rgba(240,192,64,0.35); background: linear-gradient(135deg,#100d00,#1a1400); }
  .chat-msg.roll-iniciativa { border-color: rgba(168,85,247,0.45); background: linear-gradient(135deg,#100a1a,#1c1030); }

  .chat-msg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
  .chat-msg-author { font-weight: 700; font-size: 10px; }
  .chat-msg-author.mine  { color: var(--purple); }
  .chat-msg-author.other { color: var(--blue); }
  .chat-msg-time { font-size: 9px; color: var(--text2); }
  .chat-msg-text { color: var(--text); line-height: 1.5; }

  .chat-roll-result { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .chat-roll-dice { font-size: 10px; color: var(--text2); }
  .chat-roll-total { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--gold); }
  .chat-roll-total.nat20 { color: var(--online); text-shadow: 0 0 8px var(--online); }
  .chat-roll-total.critical { color: var(--red); text-shadow: 0 0 8px var(--red); }
  .chat-roll-breakdown { font-size: 10px; color: var(--text2); }
  .chat-roll-label { font-size: 9px; color: var(--text2); margin-top: 2px; }

  .chat-input-area {
    padding: 8px 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    resize: none;
    max-height: 70px;
    font-family: 'Inter', sans-serif;
    line-height: 1.4;
  }
  .chat-input:focus { border-color: var(--purple); }
  .chat-input::placeholder { color: var(--text2); }
  .chat-send-btn {
    background: var(--purple);
    border: none;
    border-radius: 7px;
    color: white;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .chat-send-btn:hover { opacity: 0.85; }
  .chat-hint { font-size: 9px; color: var(--text2); padding: 0 10px 6px; }

  /* ════════════════════════════════════
     MODAL DADOS
  ════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 26px;
    width: 330px;
    max-width: 92vw;
    transform: translateY(10px);
    transition: transform 0.2s;
  }

  const val = document.getElementById('sessionInput').value.trim().toUpperCase();
  if (!val) { showToast('Digite um código de sessão','error'); return; }
  sessaoId = val;
  carregarSelecaoPersonagens();
};

function carregarSelecaoPersonagens() {
  const grid = document.getElementById('playerGrid');
  grid.style.display = 'grid';
  grid.innerHTML = '<p style="color:var(--text2);font-size:12px;text-align:center;grid-column:1/-1;">Carregando personagens...</p>';
  get(ref(db, `sessoes/${sessaoId}/fichas`)).then(snap => {
    renderSelecaoPersonagens(snap.val() || {});
  });
}

function renderSelecaoPersonagens(dados) {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = '';
  const ids = Object.keys(dados);

  const titulo = document.createElement('p');
  titulo.style.cssText = 'color:var(--text2);font-size:12px;text-align:center;grid-column:1/-1;';
  titulo.textContent = ids.length ? 'Selecione um personagem existente ou crie um novo:' : 'Nenhum personagem nesta sessão ainda — crie o primeiro:';
  grid.appendChild(titulo);

  ids.forEach(id => {
    const ficha = dados[id] || {};
    const c = document.createElement('div');
    c.className = 'player-card occupied';
    c.innerHTML = `
      <div class="slot-name">${ficha.nome || 'Personagem'}</div>
      <div class="slot-status">● ${ficha.linhagem||'—'} · ${ficha.grau||'—'}</div>
      <div style="display:flex;gap:5px;justify-content:center;margin-top:10px;flex-wrap:wrap">
        <button class="btn-edit-ficha" type="button">✏️ Editar</button>
        <button class="btn-delete-ficha" type="button">🗑 Excluir</button>
      </div>
    `;
    c.querySelector('.btn-delete-ficha').addEventListener('click', e => { e.stopPropagation(); excluirFicha(id, ficha.nome); });
    c.querySelector('.btn-edit-ficha').addEventListener('click', e => { e.stopPropagation(); abrirEditarPersonagem(id, ficha); });
    c.addEventListener('click', () => escolherPersonagem(id, ficha));
    grid.appendChild(c);
  });

  const novo = document.createElement('div');
  novo.className = 'player-card new-card';
  novo.innerHTML = `<div class="slot-name">＋ Novo Personagem</div><div class="slot-status">Criar ficha</div>`;
  novo.onclick = () => abrirCriarPersonagem();
  grid.appendChild(novo);

  const mestre = document.createElement('div');
  mestre.className = 'player-card new-card';
  mestre.style.cssText = 'border-color:rgba(240,192,64,0.5);';
  mestre.innerHTML = `<div class="slot-name" style="color:var(--gold)">👁 Entrar como Mestre</div><div class="slot-status">Controle total da sessão</div>`;
  mestre.onclick = () => entrarComoMestre();
  grid.appendChild(mestre);
}

function abrirCriarPersonagem() {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = `
    <div class="session-id-box" style="grid-column:1/-1;">
      <label>NOME DO PERSONAGEM</label>
      <input type="text" id="novoNomeInput" placeholder="Ex: Yuji Itadori" maxlength="30">
      <button class="btn-enter" id="btnCriarPersonagem">CRIAR FICHA</button>
      <button class="btn-enter" id="btnVoltarSelecao" style="background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:8px;">← Voltar</button>
    </div>
  `;
  document.getElementById('btnCriarPersonagem').onclick = criarPersonagem;
  document.getElementById('btnVoltarSelecao').onclick = carregarSelecaoPersonagens;
  const nomeInput = document.getElementById('novoNomeInput');
  nomeInput.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); criarPersonagem(); } });
  nomeInput.focus();
}

async function criarPersonagem() {
  const nome = document.getElementById('novoNomeInput').value.trim();
  if (!nome) { showToast('Digite um nome para o personagem','error'); return; }
  const novaRef = push(ref(db, `sessoes/${sessaoId}/fichas`));
  const ficha = fichaDefault(nome);
  await set(novaRef, ficha);
  escolherPersonagem(novaRef.key, ficha);
}

function abrirEditarPersonagem(id, ficha) {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = `
    <div class="session-id-box" style="grid-column:1/-1;">
      <label>EDITAR PERSONAGEM</label>
      <input type="text" id="editNomeInput" placeholder="Nome" maxlength="30" value="${ficha.nome||''}">
      <input type="text" id="editLinhagemInput" placeholder="Linhagem" maxlength="40" value="${ficha.linhagem||''}" style="margin-top:6px;">
      <input type="text" id="editGrauInput" placeholder="Grau" maxlength="20" value="${ficha.grau||''}" style="margin-top:6px;">
      <button class="btn-enter" id="btnSalvarEdicao">💾 Salvar</button>
      <button class="btn-enter" id="btnVoltarDeEdicao" style="background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:8px;">← Voltar</button>
    </div>
  `;
  document.getElementById('btnSalvarEdicao').onclick = async () => {
    const nome = document.getElementById('editNomeInput').value.trim() || ficha.nome;
    const linhagem = document.getElementById('editLinhagemInput').value.trim() || ficha.linhagem;
    const grau = document.getElementById('editGrauInput').value.trim() || ficha.grau;

    await set(ref(db, `sessoes/${sessaoId}/fichas/${id}/grau`), grau);

}

function entrarComoMestre() {
  modoMestre = true;
  meuSlot = '__mestre__';
  meuNome = '👁 Mestre';
  iniciarApp();
}

function escolherPersonagem(id, ficha) {
  meuSlot = id;
  meuNome = (ficha && ficha.nome) || 'Personagem';
  iniciarApp();
}

window.excluirFicha = function(id, nome) {
  if (!confirm(`Excluir a ficha de "${nome||'Personagem'}"? Esta ação não pode ser desfeita.`)) return;
  remove(ref(db, `sessoes/${sessaoId}/fichas/${id}`))
    .then(() => { showToast('Ficha excluída.','success'); carregarSelecaoPersonagens(); })
    .catch(() => showToast('Erro ao excluir ficha','error'));
};

/* ══════════════════════════════════════
   APP PRINCIPAL
══════════════════════════════════════ */
function iniciarApp() {
  document.getElementById('selectScreen').style.display = 'none';
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('mainLayout').classList.add('visible');
  document.getElementById('sessionLabel').textContent = 'Sessão: '+sessaoId;
  document.getElementById('mySlotLabel').textContent = '[ '+meuNome+' ]';

  if (modoMestre) {
    document.getElementById('btnMestre').classList.add('active');
    document.getElementById('mySlotLabel').style.color = 'var(--gold)';
  }

  // Fichas em tempo real
  onValue(ref(db, `sessoes/${sessaoId}/fichas`), snap => {
    fichasData = snap.val() || {};
    renderFichas();
    if (!modoMestre) {
      const nomeAtual = fichasData[meuSlot]?.nome || meuNome;
      document.getElementById('mySlotLabel').textContent = '[ '+nomeAtual+' ]';
    }
  });

  // Chat em tempo real
  onValue(ref(db, `sessoes/${sessaoId}/chat`), snap => {
    renderChat(snap.val() || {});
  });

  // Iniciativa em tempo real
  onValue(ref(db, `sessoes/${sessaoId}/iniciativa`), snap => {
    renderIniciativa(snap.val() || {});
  });

  // Turno em tempo real
  onValue(ref(db, `sessoes/${sessaoId}/turno`), snap => {
    const t = snap.val();
    if (t !== null && t !== undefined) {
      turnoAtual = t.indice || 0;
      turnoNumero = t.numero || 1;
    } else {
      turnoAtual = 0;
      turnoNumero = 1;
    }
    renderIniciativa(window.__iniciativaCache || {});
  });

  // Mensagem de entrada
  enviarSistema(meuNome + ' entrou na sessão.');
}

window.toggleMestre = function() {

/* ══════════════════════════════════════
   ORDEM DE INICIATIVA
══════════════════════════════════════ */
function renderIniciativa(data) {
  window.__iniciativaCache = data;
  const list = document.getElementById('initiativeList');
  const entries = Object.values(data);

  if (entries.length === 0) {
    list.innerHTML = '<div class="init-empty">Nenhuma iniciativa rolada ainda.</div>';
    document.getElementById('turnoControls').style.display = 'none';
    // Remover destaque de turno de todos os cards
    document.querySelectorAll('.ficha-card.turno-ativo').forEach(c => c.classList.remove('turno-ativo'));
    document.querySelectorAll('.turno-ativo-banner').forEach(b => b.remove());
    return;
  }

  entries.sort((a, b) => b.total - a.total);

  // Garantir que turnoAtual seja válido
  if (turnoAtual >= entries.length) turnoAtual = 0;
  const ativoEntry = entries[turnoAtual];

  list.innerHTML = '';
  entries.forEach((e, i) => {
    const row = document.createElement('div');
    const isAtivo = i === turnoAtual;
    const rankClass = isAtivo ? 'ativo' : (i === 0 && turnoAtual !== 0 ? 'first' : i === 1 ? 'second' : '');
    row.className = 'init-row ' + rankClass;

    const rankIcon = isAtivo ? '▶' : i === 0 ? '👑' : i === 1 ? '②' : i === 2 ? '③' : (i + 1);
    const natTag = e.roll === 20
      ? '<span class="init-nat crit">NAT 20</span>'
      : e.roll === 1
      ? '<span class="init-nat fail">FALHA</span>'
      : '';

    row.innerHTML = `
      <span class="init-rank">${rankIcon}</span>
      <span class="init-score">${e.total}</span>
      <span class="init-name">${e.charName || e.slot}</span>
      ${natTag}
    `;
    list.appendChild(row);
  });

  // Mostrar/esconder controles de turno (só mestre ou se já há iniciativa)
  const turnoCtrl = document.getElementById('turnoControls');
  turnoCtrl.style.display = 'flex';
  document.getElementById('turnoCounter').textContent = `Turno ${turnoNumero} · ${ativoEntry?.charName||''}`;

  // Destacar card da ficha ativa
  document.querySelectorAll('.ficha-card').forEach(card => {
    const isTurnoAtivo = ativoEntry && card.dataset.slot === ativoEntry.slot;
    card.classList.toggle('turno-ativo', isTurnoAtivo);

    // Banner de turno ativo
    const bannerExistente = card.querySelector('.turno-ativo-banner');
    if (isTurnoAtivo && !bannerExistente) {
      const banner = document.createElement('div');
      banner.className = 'turno-ativo-banner';
      banner.innerHTML = '<span>●</span> VEZ DESTE PERSONAGEM';
      card.insertBefore(banner, card.querySelector('.card-header'));
    } else if (!isTurnoAtivo && bannerExistente) {
      bannerExistente.remove();
    }
  });
}

window.avancarTurno = function(dir) {
  const entries = Object.values(window.__iniciativaCache || {});
  if (entries.length === 0) return;
  entries.sort((a, b) => b.total - a.total);

  const novoIndice = (turnoAtual + dir + entries.length) % entries.length;
  let novoNumero = turnoNumero;
  if (dir > 0 && novoIndice === 0) novoNumero++;
  if (dir < 0 && turnoAtual === 0) novoNumero = Math.max(1, novoNumero - 1);

  set(ref(db, `sessoes/${sessaoId}/turno`), { indice: novoIndice, numero: novoNumero });
  const nome = entries[novoIndice]?.charName || '';
  enviarSistema(`⚔️ Turno ${novoNumero} — vez de ${nome}.`);
};

window.limparIniciativa = function() {
  if (!sessaoId) return;
  remove(ref(db, `sessoes/${sessaoId}/iniciativa`));
  remove(ref(db, `sessoes/${sessaoId}/turno`));
  enviarSistema('Ordem de iniciativa reiniciada.');
};

window.limparChat = function() {
  if (!sessaoId) return;
  if (!confirm('Limpar todo o log de sessão? Esta ação não pode ser desfeita.')) return;
  remove(ref(db, `sessoes/${sessaoId}/chat`));
};

/* ══════════════════════════════════════
   CHAT
══════════════════════════════════════ */
function renderChat(msgs) {
  const container = document.getElementById('chatMessages');
  const atBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;

  const lista = Object.values(msgs).sort((a,b) => (a.ts||0)-(b.ts||0));
  container.innerHTML = '';

  lista.forEach(msg => {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (msg.type||'');
    const hora = msg.ts ? new Date(msg.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';

    if (msg.type === 'system') {
      div.innerHTML = `<span style="font-size:10px;">⚙ ${msg.text}</span>`;
    } else if (msg.type === 'roll' || msg.type === 'roll-iniciativa') {
      const ac = msg.slot === meuSlot ? 'mine' : 'other';
      const breakdown = msg.rolls.length > 1
        ? `[${msg.rolls.join(' + ')}]` + (msg.bonus ? ` +${msg.bonus}` : '')
        : (msg.bonus ? `+${msg.bonus}` : '');
      div.innerHTML = `
        <div class="chat-msg-header">
          <span class="chat-msg-author ${ac}">${msg.charName||msg.slot}</span>
          <span class="chat-msg-time">${hora}</span>
        </div>
        <div class="chat-roll-result">
          <span class="chat-roll-dice">${msg.formula}</span>
          <span class="chat-roll-total ${msg.special||''}">${msg.total}</span>
          <span class="chat-roll-breakdown">${breakdown}</span>
        </div>
        ${msg.label ? `<div class="chat-roll-label">${msg.label}</div>` : ''}
      `;
    } else {
      const ac = msg.slot === meuSlot ? 'mine' : 'other';
      div.innerHTML = `
        <div class="chat-msg-header">
          <span class="chat-msg-author ${ac}">${msg.charName||msg.slot}</span>
          <span class="chat-msg-time">${hora}</span>
        </div>
        <div class="chat-msg-text">${esc(msg.text)}</div>
      `;
    }
    container.appendChild(div);
  });

  if (atBottom) container.scrollTop = container.scrollHeight;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function enviarSistema(texto) {
  push(ref(db, `sessoes/${sessaoId}/chat`), { type:'system', text:texto, ts:Date.now() });
}

window.chatKeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
};

window.enviarMensagem = function() {
  const inp = document.getElementById('chatInput');
  const texto = inp.value.trim();
  if (!texto) return;
  inp.value = '';

  // /r NdX ou /r NdX+B
  const m = texto.match(/^\/r(?:oll)?\s+(\d+)d(\d+)(?:\s*[+]\s*(\d+))?$/i);
  if (m) {
    publicarRolagem(parseInt(m[1]), parseInt(m[2]), m[3] ? parseInt(m[3]) : 0, null, 'roll');
    return;
  }

  const charName = fichasData[meuSlot]?.nome || meuSlot;
  push(ref(db, `sessoes/${sessaoId}/chat`), {
    type:'msg', slot:meuSlot, charName, text:texto, ts:Date.now()
  });
};

/* ══════════════════════════════════════
   ROLAGEM GENÉRICA
══════════════════════════════════════ */
function rolarDice(qty, sides) {
  const r = [];
  for (let i = 0; i < qty; i++) r.push(Math.floor(Math.random()*sides)+1);
  return r;
}

function publicarRolagem(qty, sides, bonus, label, tipo) {
  const rolls  = rolarDice(qty, sides);
  const soma   = rolls.reduce((a,b)=>a+b,0);
  const total  = soma + (bonus||0);
  const isCrit = qty===1 && sides===20 && rolls[0]===20;
  const isFail = qty===1 && sides===20 && rolls[0]===1;
  const slotEfetivo = window.__rolarComoSlot || meuSlot;
  const charName = fichasData[slotEfetivo]?.nome || (modoMestre ? '👁 Mestre' : meuSlot);
  const formula  = bonus ? `${qty}d${sides}+${bonus}` : `${qty}d${sides}`;

  push(ref(db, `sessoes/${sessaoId}/chat`), {
    type: tipo||'roll', slot:slotEfetivo, charName, formula, rolls, bonus:bonus||0, total,
    label: label || (isCrit?'⚡ Crítico Natural!': isFail?'💀 Falha Crítica!':''),
    special: isCrit?'nat20': isFail?'critical':'',
    ts: Date.now()
  });
  return { rolls, total, isCrit, isFail };
}

   MODAL DADOS

window.rolarModal = function(enviar) {
  const qty   = Math.max(1, Math.min(20, parseInt(document.getElementById('diceQty').value)||1));
  const sides = Math.max(2, Math.min(100, parseInt(document.getElementById('diceSides').value)||6));
  const rolls  = rolarDice(qty, sides);
  const total  = rolls.reduce((a,b)=>a+b,0);
  const isCrit = qty===1 && sides===20 && rolls[0]===20;
  const isFail = qty===1 && sides===20 && rolls[0]===1;

  const numEl = document.getElementById('diceResultNum');
  numEl.className = 'dice-result-num rolling' + (isCrit?' crit':isFail?' fail':'');
  setTimeout(()=>numEl.classList.remove('rolling'),600);
  numEl.textContent = total;
  document.getElementById('diceResultDetail').textContent = isCrit?'⚡ CRÍTICO!':isFail?'💀 FALHA!':(`${qty}d${sides}`);
  document.getElementById('diceResultBreakdown').textContent = rolls.length>1 ? `[${rolls.join(' + ')}]` : '';

  if (enviar && sessaoId) {
    publicarRolagem(qty, sides, 0, null, 'roll');
    fecharModal();
  }
};

/* ══════════════════════════════════════
   INICIATIVA
══════════════════════════════════════ */
window.rolarIniciativa = function(slot, dexVal) {
  if (slot !== meuSlot) return;
  const dex    = parseInt(dexVal)||10;
  const bonus  = Math.floor((dex-10)/2);
  const roll   = Math.floor(Math.random()*20)+1;
  const total  = roll + bonus;
  const bonusStr = (bonus>=0?'+':'')+bonus;
  const isCrit = roll===20;
  const isFail = roll===1;
  const charName = fichasData[meuSlot]?.nome || meuSlot;

  // Salvar na ordem de iniciativa (keyed por slot para sobrescrever re-rolls)
  set(ref(db, `sessoes/${sessaoId}/iniciativa/${slot.replace(/\s+/g,'_')}`), {
    slot, charName, roll, bonus, total, ts: Date.now()
  });

  // Postar no chat
  push(ref(db, `sessoes/${sessaoId}/chat`), {
    type:'roll-iniciativa', slot, charName,
    formula: `1d20${bonusStr} (Iniciativa)`,
    rolls:[roll], bonus, total,
    label: '⚔️ Iniciativa' + (isCrit?' — Crítico!': isFail?' — Falha!':''),
    special: isCrit?'nat20': isFail?'critical':'',
    ts: Date.now()
  });

  showToast(`⚔️ Iniciativa: ${roll}${bonusStr} = ${total}`, 'roll');
};

/* ══════════════════════════════════════
   RENDERIZAR FICHAS
══════════════════════════════════════ */
function renderFichas() {
  const container = document.getElementById('fichasContainer');
  const ids = Object.keys(fichasData);
  document.getElementById('onlineCount').textContent = ids.length;
  const ordem = modoMestre ? ids : [meuSlot, ...ids.filter(id => id !== meuSlot)];
  container.innerHTML = '';
  ordem.forEach(id => { if (fichasData[id]) container.appendChild(criarCard(id, fichasData[id])); });
  // Re-aplicar destaque de turno
  if (window.__iniciativaCache) renderIniciativa(window.__iniciativaCache);
}

function criarCard(slot, d) {
  const ismine = (slot === meuSlot) || modoMestre;
  const isMeuCard = slot === meuSlot;
  const card = document.createElement('div');
  let cardClass = 'ficha-card';
  if (isMeuCard) cardClass += ' is-mine';
  if (modoMestre && !isMeuCard) cardClass += ' mestre-mode';
  card.className = cardClass;
  card.dataset.slot = slot;

  const ea = ismine ? 'contenteditable="true"' : 'contenteditable="false"';
  const pvPct  = Math.max(0,Math.min(100, d.pvMax>0?(d.pv/d.pvMax)*100:0));
  const eaPct  = Math.max(0,Math.min(100, d.eaMax>0?(d.ea/d.eaMax)*100:0));
  const pvtPct = Math.max(0,Math.min(100, d.pvtMax>0?(d.pvt/d.pvtMax)*100:0));
  const mod = v => { const m=Math.floor((v-10)/2); return (m>=0?'+':'')+m; };
  const dexMod = Math.floor(((d.dex??0)-10)/2);
  const dexStr = (dexMod>=0?'+':'')+dexMod;
  const tecnicasInatas = d.tecnicasInatas || tecnicasInatasDefault();
  const dominioSimples = d.dominioSimples || dominioSimplesDefault();
  const dominioExpansao = d.dominioExpansao || dominioExpansaoDefault();
  const inventario = d.inventario || [];
  const condicoes = d.condicoes || [];

  // Avatar
  const avatarSrc = d.avatar ? `<img src="${d.avatar}" alt="avatar">` : `<span style="font-size:22px">${(d.nome||'?')[0]}</span>`;
  const avatarEditable = ismine ? 'class="avatar-circle editable"' : 'class="avatar-circle"';

  // Badge mestre
  const badgeLabel = modoMestre && !isMeuCard ? '👁 Mestre' : (isMeuCard ? '✦ Você' : (d.nome||'Jogador'));
  const badgeClass = isMeuCard ? '' : (modoMestre ? '' : 'other');

  // Condições HTML
  const COND_INFO = {
    sangrando:  { icon:'🩸', label:'Sangrando' },
    atordoado:  { icon:'💫', label:'Atordoado' },
    envenenado: { icon:'☠️', label:'Envenenado' },
    amedrontado:{ icon:'😨', label:'Amedrontado' },
    paralisado: { icon:'🧊', label:'Paralisado' },
    invisivel:  { icon:'👻', label:'Invisível' },
  };
  const condicoesHTML = condicoes.map(c => {
    const info = COND_INFO[c] || { icon:'⚠️', label: c };
    const rem = ismine ? `<span class="remove-cond" data-cond="${c}" title="Remover">✕</span>` : '';
    return `<span class="condicao-tag cond-${c}">${info.icon} ${info.label} ${rem}</span>`;
  }).join('');
  const addCondBtn = ismine ? `<button class="btn-add-cond" data-slot="${slot}">+ Condição</button>` : '';

  // Inventário HTML
  const inventarioHTML = inventario.map((item, idx) => `
    <div class="inventario-item" data-idx="${idx}">
      <input class="inv-qty num-input" type="number" value="${item.qty||1}" min="0" data-field="inventario/${idx}/qty" ${ismine?'':'disabled'}>
      <div style="flex:1;display:flex;flex-direction:column;gap:1px">
        <span class="inv-nome" ${ea} data-field="inventario/${idx}/nome">${item.nome||'Item'}</span>
        <span class="inv-desc" ${ea} data-field="inventario/${idx}/desc">${item.desc||''}</span>
      </div>
      ${ismine ? `<button class="btn-del-item" data-idx="${idx}" title="Remover item">✕</button>` : ''}
    </div>`).join('');

  // Técnicas de reforço fixas com botão rolar
  const tecnicasReforcoFixed = [
    { nome:'Reforço dos Punhos',      custo:'5 EA',  formula:'1d4', label:'Reforço dos Punhos', efeito:'1d4 + Mod. FOR',            desc:'Imbui as mãos com energia amaldiçoada para causar mais dano.' },
    { nome:'Barreira Corporal',       custo:'10 EA', formula:'1d6', label:'Barreira Corporal',   efeito:'+1d6 + Mod. CON em PVT • +CA por 1 rodada', desc:'Gera Pontos de Vida Temporários e aumenta CA.' },
    { nome:'Passo Amaldiçoado',       custo:'15 EA', formula:'1d6', label:'Passo Amaldiçoado',   efeito:'+3m Deslocamento por 2 rodadas', desc:'Aumenta o deslocamento temporariamente.' },
    { nome:'Fortalecimento de Habilidade', custo:'20 EA', formula:'1d8', label:'Fortalecimento', efeito:'Reforço da Técnica',       desc:'Melhora capacidade, dano e qualidade de uma técnica.' },
  ];

  card.innerHTML = `
    <div class="card-header">
      <div ${avatarEditable} data-slot="${slot}" title="${ismine?'Clique para alterar avatar':''}">
        ${avatarSrc}
      </div>
      ${ismine ? `<input type="file" class="avatar-input" accept="image/*" data-slot="${slot}">` : ''}
      <div class="card-header-left" style="margin-left:10px">
        <div class="char-name" ${ea} data-field="nome">${d.nome||slot}</div>
        <div class="char-meta">
          <span>⚡ <span ${ea} data-field="linhagem">${d.linhagem||'—'}</span></span>
          <span>◆ <span ${ea} data-field="grau">${d.grau||'—'}</span></span>
          <span>▲ <span ${ea} data-field="nivel">${d.nivel||'—'}</span></span>
          <span>🏛 <span ${ea} data-field="afiliacao">${d.afiliacao||'—'}</span></span>
        </div>
        <div class="condicoes-area">${condicoesHTML}${addCondBtn}</div>
      </div>
      <span class="player-badge ${badgeClass}">${badgeLabel}</span>
    </div>

    <div class="card-body">

      <div>
        <div class="section-label">Recursos</div>
        <div class="resource-bars">
          <div class="resource-row">
            <span class="resource-label pv">PV</span>
            <div class="bar-track"><div class="bar-fill pv" style="width:${pvPct}%"></div></div>
            <div class="resource-inputs">
              <input class="num-input" type="number" data-field="pv"    value="${d.pv}"    min="0" max="${d.pvMax}"  ${ismine?'':'disabled'}>
              <span class="num-sep">/</span>
              <input class="num-input" type="number" data-field="pvMax" value="${d.pvMax}" min="0" ${ismine?'':'disabled'}>
            </div>
          </div>
          <div class="resource-row">
            <span class="resource-label pvt">PVT</span>
            <div class="bar-track"><div class="bar-fill pvt" style="width:${pvtPct}%"></div></div>
            <div class="resource-inputs">
              <input class="num-input" type="number" data-field="pvt"    value="${d.pvt}"     min="0" max="${d.pvtMax||99}" ${ismine?'':'disabled'}>
              <span class="num-sep">/</span>
              <input class="num-input" type="number" data-field="pvtMax" value="${d.pvtMax||0}" min="0" ${ismine?'':'disabled'}>
            </div>
          </div>
          <div class="resource-row">
            <span class="resource-label ea">EA</span>
            <div class="bar-track"><div class="bar-fill ea" style="width:${eaPct}%"></div></div>
            <div class="resource-inputs">
              <input class="num-input" type="number" data-field="ea"    value="${d.ea}"    min="0" max="${d.eaMax}"  ${ismine?'':'disabled'}>
              <span class="num-sep">/</span>
              <input class="num-input" type="number" data-field="eaMax" value="${d.eaMax}" min="0" ${ismine?'':'disabled'}>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">Status</div>
        <div class="status-grid">
          <div class="status-box"><span class="s-label">Deslocamento</span><span class="s-val" ${ea} data-field="deslocamento">${d.deslocamento??0}m</span></div>
          <div class="status-box"><span class="s-label">CA</span><span class="s-val" ${ea} data-field="ca">${d.ca??0}</span></div>
          <div class="status-box"><span class="s-label">Grau</span><span class="s-val" style="font-size:13px" ${ea} data-field="grau2">${d.grau||'3'}</span></div>
        </div>
      </div>

      <div>
        <div class="section-label">Atributos</div>
        <div class="attrs-grid">
          ${['for','dex','con','int','wis','cha'].map(a=>`
            <div class="attr-box">
              <div class="attr-abbr">${a.toUpperCase()}</div>
              <span class="attr-val" ${ea} data-field="${a}">${d[a]??0}</span>
              <div class="attr-mod">${mod(d[a]??0)}</div>
            </div>`).join('')}
        </div>
        ${isMeuCard ? `
        <button class="btn-iniciativa" onclick="rolarIniciativa('${slot}', ${d.dex??0})">
          🎲 Iniciativa &nbsp;<small style="opacity:0.65;font-size:10px;">(1d20 ${dexStr})</small>
        </button>` : `
        <div style="margin-top:8px;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;text-align:center;font-size:10px;color:var(--text2);">
          ⚔️ Iniciativa DEX ${dexStr}
        </div>`}
      </div>

      <div>
        <div class="section-label">Técnicas de Reforço</div>
        <div class="tecnicas-list">
          ${tecnicasReforcoFixed.map(t => `
          <div class="tecnica-item">
            <div class="tecnica-top">
              <span class="tecnica-nome">${t.nome}</span>
              <div style="display:flex;gap:4px;align-items:center">
                <span class="tecnica-custo">${t.custo}</span>
                ${ismine ? `<button class="btn-rolar-tecnica" data-formula="${t.formula}" data-label="${t.label}">🎲</button>` : ''}
              </div>
            </div>
            <span class="tecnica-efeito">${t.efeito}</span>
            <span class="tecnica-desc">${t.desc}</span>
          </div>`).join('')}
        </div>
      </div>

      <div>
        <div class="section-label">Técnicas Inatas</div>
        <div class="tecnicas-list">
          ${tecnicasInatas.map((t,i)=>`
          <div class="tecnica-item">
            <div class="tecnica-top">
              <span class="tecnica-nome" ${ea} data-field="tecnicasInatas/${i}/nome">${t.nome||('Técnica Inata '+(i+1))}</span>
              <div style="display:flex;gap:4px;align-items:center">
                <span class="tecnica-custo" ${ea} data-field="tecnicasInatas/${i}/custo">${t.custo||'— EA'}</span>
                ${ismine ? `<button class="btn-rolar-tecnica" data-formula="${parseTecnicaFormula(t.efeito)}" data-label="${t.nome||'Técnica'}">🎲</button>` : ''}
              </div>
            </div>
            <span class="tecnica-efeito" ${ea} data-field="tecnicasInatas/${i}/efeito">${t.efeito||'Alcance / Dano / Salvaguarda'}</span>
            <span class="tecnica-desc" ${ea} data-field="tecnicasInatas/${i}/desc">${t.desc||'Descreva o efeito da técnica...'}</span>
          </div>`).join('')}
        </div>
      </div>

      <div>
        <div class="section-label">Inventário</div>
        <div class="inventario-list" id="inv-${slot}">
          ${inventarioHTML}
        </div>
        ${ismine ? `<button class="btn-add-item" data-slot="${slot}">＋ Adicionar item</button>` : ''}
      </div>

      <div>
        <div class="section-label">Barreiras &amp; Domínios</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="dominio-box simples">
            <div class="dominio-title">🛡️ Domínio Simples</div>
            <div class="dominio-desc" ${ea} data-field="dominioSimples/desc">${dominioSimples.desc||'Descreva a barreira de domínio simples do seu personagem...'}</div>
            <div class="dominio-efeito" ${ea} data-field="dominioSimples/efeito">${dominioSimples.efeito||'Descreva os efeitos do domínio simples...'}</div>
          </div>
          <div class="dominio-box expansao">
            <div class="dominio-title">💀 Expansão de Domínio</div>
            <div class="dominio-desc" ${ea} data-field="dominioExpansao/desc">${dominioExpansao.desc||'Descreva a expansão de domínio do seu personagem...'}</div>
            <div class="dominio-efeito" ${ea} data-field="dominioExpansao/efeito">${dominioExpansao.efeito||'Descreva os efeitos da expansão de domínio...'}</div>
          </div>
        </div>
      </div>

    </div>`;

  // Overlay inconsciente/derrotado
  if (d.pvMax > 0 && d.pv <= 0) {
    const overlay = document.createElement('div');
    overlay.className = 'status-overlay';
    overlay.innerHTML = `<div class="status-overlay-text">💀 INCONSCIENTE</div><div class="status-overlay-sub">PV chegou a 0</div>`;
    if (ismine) {
      const btnAcordar = document.createElement('button');
      btnAcordar.textContent = '↑ Recuperar (1 PV)';
      btnAcordar.style.cssText = 'margin-top:8px;padding:6px 14px;background:var(--online);border:none;border-radius:6px;color:#0a0a0f;font-size:11px;font-weight:700;cursor:pointer;';
      btnAcordar.onclick = () => salvar(slot, 'pv', 1);
      overlay.appendChild(btnAcordar);
    }
    card.appendChild(overlay);
  }

  // Eventos
  if (ismine) {
    // Inputs numéricos
    card.querySelectorAll('input.num-input').forEach(inp => {
      if (inp.classList.contains('inv-qty')) {
        inp.addEventListener('change', () => salvar(slot, inp.dataset.field, Number(inp.value)));
      } else {
        inp.addEventListener('change', () => salvar(slot, inp.dataset.field, Number(inp.value)));
      }
    });

    // Contenteditable
    card.querySelectorAll('[contenteditable="true"]').forEach(el => {
      el.addEventListener('blur', () => {
        let v = el.textContent.trim();
        if (['deslocamento','ca','for','dex','con','int','wis','cha'].includes(el.dataset.field)) v = parseInt(v)||0;
        salvar(slot, el.dataset.field, v);
      });
      el.addEventListener('keydown', e => { if (e.key==='Enter'){e.preventDefault();el.blur();} });
    });

    // Botões rolar técnica
    card.querySelectorAll('.btn-rolar-tecnica').forEach(btn => {
      btn.addEventListener('click', () => {
        const formula = btn.dataset.formula || '1d6';
        const label = btn.dataset.label || 'Técnica';
        const m = formula.match(/(\d+)d(\d+)(?:\+(\d+))?/i);
        if (m) {
          // Temporariamente mudar meuSlot para o slot correto
          const slotOriginal = meuSlot;
          if (modoMestre) window.__rolarComoSlot = slot;
          publicarRolagem(parseInt(m[1]), parseInt(m[2]), m[3]?parseInt(m[3]):0, `🔥 ${label}`, 'roll');
          if (modoMestre) window.__rolarComoSlot = null;
        } else {
          publicarRolagem(1, 6, 0, `🔥 ${label}`, 'roll');
        }
      });
    });

    // Avatar click
    const avatarEl = card.querySelector('.avatar-circle');
    const fileInput = card.querySelector('.avatar-input');
    if (avatarEl && fileInput) {
      avatarEl.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => salvar(slot, 'avatar', ev.target.result);
        reader.readAsDataURL(file);
      });
    }

    // Adicionar condição
    const addCondBtnEl = card.querySelector('.btn-add-cond');
    if (addCondBtnEl) {
      addCondBtnEl.addEventListener('click', () => abrirMenuCondicao(slot, d.condicoes||[]));
    }

    // Remover condição
    card.querySelectorAll('.remove-cond').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const cond = el.dataset.cond;
        const novas = (d.condicoes||[]).filter(c => c !== cond);
        salvar(slot, 'condicoes', novas);
      });
    });

    // Adicionar item ao inventário
    const addItemBtn = card.querySelector('.btn-add-item');
    if (addItemBtn) {
      addItemBtn.addEventListener('click', () => {
        const inv = [...(fichasData[slot]?.inventario || []), { nome:'Novo Item', qty:1, desc:'' }];
        salvar(slot, 'inventario', inv);
      });
    }

    // Remover item do inventário
    card.querySelectorAll('.btn-del-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const inv = [...(fichasData[slot]?.inventario || [])];
        inv.splice(idx, 1);
        salvar(slot, 'inventario', inv.length ? inv : null);
      });
    });
  }

  return card;
}

// Extrai fórmula de dado de um texto de efeito ex: "1d6 + Mod. FOR" → "1d6"
function parseTecnicaFormula(efeito) {
  const m = (efeito||'').match(/(\d+d\d+(?:\+\d+)?)/i);
  return m ? m[1] : '1d6';
}

function abrirMenuCondicao(slot, condicoesAtuais) {
  const CONDS = ['sangrando','atordoado','envenenado','amedrontado','paralisado','invisivel'];
  const disponiveis = CONDS.filter(c => !condicoesAtuais.includes(c));
  if (disponiveis.length === 0) { showToast('Todas as condições já aplicadas.',''); return; }
  const escolha = prompt(`Adicionar condição:\n${disponiveis.map((c,i)=>`${i+1}. ${c}`).join('\n')}\n\nDigite o número:`);
  if (!escolha) return;
  const idx = parseInt(escolha) - 1;
  if (idx >= 0 && idx < disponiveis.length) {
    const novas = [...condicoesAtuais, disponiveis[idx]];
    salvar(slot, 'condicoes', novas);
  }
}

function salvar(slot, field, value) {
  set(ref(db, `sessoes/${sessaoId}/fichas/${slot}/${field}`), value)
    .catch(() => showToast('Erro ao salvar','error'));
}
</script>
</body>
</html>
