<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha — Jujutsu Kaisen RPG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
 
  :root {
    --bg:        #0a0a0f;
    --bg2:       #11111a;
    --bg3:       #1a1a28;
    --border:    #2a2a40;
    --border2:   #3a3a55;
    --blue:      #4a9eff;
    --red:       #ff4a4a;
    --purple:    #a855f7;
    --gold:      #f0c040;
    --text:      #e0e0f0;
    --text2:     #8888aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* === LAYOUT PRINCIPAL === */
  .app-container {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .fichas-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }

  /* Chat */
  .chat-panel {
    width: 320px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    padding: 14px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    color: var(--gold);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 14px;
  }

  .chat-message {
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--bg3);
  }

  .chat-message.system {
    background: rgba(168, 85, 247, 0.15);
    border-left: 3px solid var(--purple);
  }

  .chat-message .sender {
    font-size: 12px;
    color: var(--purple);
    margin-bottom: 3px;
  }

  .chat-input-area {
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .chat-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
  }

  /* Modal Rolagem */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-content {
    background: var(--bg2);
    border: 1px solid var(--purple);
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
  }
</style>
</head>
<body>

<div class="app-container">
  <!-- Área Principal -->
  <div class="main-content">
    <header class="app-header" id="appHeader" style="display:none; padding:14px 24px; background:var(--bg2); border-bottom:1px solid var(--border);">
      <span style="font-family:Cinzel; color:var(--gold); letter-spacing:3px;">JUJUTSU KAISEN RPG</span>
      <div style="display:flex; gap:16px; font-size:13px; color:var(--text2);">
        <span id="sessionLabel"></span>
        <span id="mySlotLabel" style="color:var(--purple)"></span>
      </div>
    </header>

    <div class="fichas-container" id="fichasContainer"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">💬 Chat da Sessão</div>
    <div class="chat-messages" id="chatMessages"></div>
    
    <div class="chat-input-area">
      <input type="text" id="chatInput" class="chat-input" placeholder="Digite uma mensagem...">
      <button onclick="enviarMensagem()" style="margin-top:8px; width:100%; padding:10px; background:var(--purple); border:none; border-radius:6px; color:white; font-weight:600;">Enviar</button>
    </div>
  </div>
</div>

<!-- MODAL ROLAGEM DE DADOS -->
<div class="modal" id="diceModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px; color:var(--gold);">🎲 Rolagem de Dados</h3>
    
    <label>Quantidade de dados:</label>
    <input type="number" id="qtdDados" value="1" min="1" style="width:100%; padding:8px; margin:8px 0; background:var(--bg3); border:1px solid var(--border); color:white; border-radius:6px;">
    
    <label>Lados do dado:</label>
    <select id="ladosDado" style="width:100%; padding:8px; margin:8px 0; background:var(--bg3); border:1px solid var(--border); color:white; border-radius:6px;">
      <option value="4">d4</option>
      <option value="6" selected>d6</option>
      <option value="8">d8</option>
      <option value="10">d10</option>
      <option value="12">d12</option>
      <option value="20">d20</option>
      <option value="100">d100</option>
    </select>

    <div style="margin-top:20px; display:flex; gap:10px;">
      <button onclick="rolarDados()" style="flex:1; padding:12px; background:var(--purple); border:none; border-radius:6px; color:white;">Rolar</button>
      <button onclick="fecharModal()" style="flex:1; padding:12px; background:var(--bg3); border:1px solid var(--border); border-radius:6px;">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get, push }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = { /* suas credenciais */ };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let sessaoId = null;
let meuSlot = null;
let fichasData = {};

const SLOTS = ['Jogador 1','Jogador 2','Jogador 3','Jogador 4','Mestre'];

// ==================== FUNÇÕES DE ROLAGEM ====================

function rolarDado(lados) {
  return Math.floor(Math.random() * lados) + 1;
}

window.abrirRolagem = function() {
  document.getElementById('diceModal').style.display = 'flex';
};

window.fecharModal = function() {
  document.getElementById('diceModal').style.display = 'none';
};

window.rolarDados = function() {
  const qtd = parseInt(document.getElementById('qtdDados').value) || 1;
  const lados = parseInt(document.getElementById('ladosDado').value);
  
  let resultados = [];
  let total = 0;

  for(let i = 0; i < qtd; i++) {
    const r = rolarDado(lados);
    resultados.push(r);
    total += r;
  }

  const texto = qtd > 1 
    ? `${qtd}d${lados} → ${resultados.join(' + ')} = **${total}**`
    : `d${lados} → **${total}**`;

  enviarMensagemSistema(`${meuSlot} rolou: ${texto}`);
  fecharModal();
};

// ==================== INICIATIVA ====================

function rolarIniciativa(slot, dex) {
  const d20 = rolarDado(20);
  const mod = Math.floor((dex - 10) / 2);
  const total = d20 + mod;

  const msg = `${slot} rolou **Iniciativa**: ${total} (${d20} + ${mod >= 0 ? '+' : ''}${mod})`;
  enviarMensagemSistema(msg);
}

// ==================== CHAT ====================

function enviarMensagemSistema(texto) {
  const chatRef = ref(db, `sessoes/${sessaoId}/chat`);
  push(chatRef, {
    type: 'system',
    text: texto,
    timestamp: Date.now(),
    slot: meuSlot
  });
}

window.enviarMensagem = function() {
  const input = document.getElementById('chatInput');
  const texto = input.value.trim();
  if (!texto) return;

  const chatRef = ref(db, `sessoes/${sessaoId}/chat`);
  push(chatRef, {
    type: 'message',
    text: texto,
    timestamp: Date.now(),
    slot: meuSlot
  });

  input.value = '';
};

// ==================== RENDERIZAÇÃO ====================

function criarFichaCard(slot, d) {
  const ismine = slot === meuSlot;
  const card = document.createElement('div');
  card.className = `ficha-card ${ismine ? 'is-mine' : ''}`;
  
  const modDex = Math.floor((d.dex - 10) / 2);

  card.innerHTML = `
    <!-- ... todo seu HTML anterior da ficha ... -->
    <!-- Adicione isso dentro do card-body, por exemplo após os atributos: -->
    <button onclick="rolarIniciativa('${slot}', ${d.dex})" 
            style="margin-top:12px; width:100%; padding:10px; background:var(--gold); color:black; border:none; border-radius:6px; font-weight:600;">
      🎲 Iniciativa (1d20 + ${modDex >= 0 ? '+' : ''}${modDex})
    </button>
  `;

  // Manter todo o resto do seu criarFichaCard original...
  return card;
}

// ==================== LISTENERS ====================

// Listener do Chat
function initChat() {
  const chatRef = ref(db, `sessoes/${sessaoId}/chat`);
  onValue(chatRef, (snap) => {
    const msgs = snap.val() || {};
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';

    Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
      const div = document.createElement('div');
      div.className = `chat-message ${msg.type === 'system' ? 'system' : ''}`;
      div.innerHTML = `
        <div class="sender">${msg.slot}</div>
        <div>${msg.text}</div>
      `;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  });
}

// ... (mantenha o resto do seu código: entrarSessao, escolherSlot, etc.)

// Adicione no final do iniciarApp():
initChat();
</script>
</body>
</html>
