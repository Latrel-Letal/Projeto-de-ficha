<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha — Jujutsu Kaisen RPG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
 
  :root {
    --bg:        #0a0a0f;
    --bg2:       #11111a;
    --bg3:       #1a1a28;
    --border:    #2a2a40;
    --border2:   #3a3a55;
    --blue:      #4a9eff;
    --blue-glow: rgba(74,158,255,0.15);
    --red:       #ff4a4a;
    --red-glow:  rgba(255,74,74,0.15);
    --purple:    #a855f7;
    --purple-glow: rgba(168,85,247,0.15);
    --gold:      #f0c040;
    --text:      #e0e0f0;
    --text2:     #8888aa;
    --text3:     #555577;
    --online:    #22c55e;
    --radius:    10px;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }
 
  /* ── HEADER ── */
  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .session-info {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text2);
  }
  .online-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--online);
    box-shadow: 0 0 6px var(--online);
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
 
  /* ── SELETOR DE JOGADOR ── */
  .player-select-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 32px;
    padding: 40px 20px;
  }
  .player-select-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 4px;
    text-align: center;
  }
  .player-select-subtitle {
    color: var(--text2);
    text-align: center;
    margin-top: -20px;
    font-size: 14px;
  }
  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    max-width: 700px;
    width: 100%;
  }
  .player-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .player-card:hover {
    border-color: var(--purple);
    box-shadow: 0 0 20px var(--purple-glow);
    transform: translateY(-2px);
  }
  .player-card .slot-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .player-card .slot-status {
    font-size: 12px;
    color: var(--text2);
  }
  .player-card.occupied .slot-status { color: var(--online); }
  .session-id-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  .session-id-box label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 8px; }
  .session-id-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
  }
  .session-id-box input:focus { border-color: var(--purple); }
  .btn-enter {
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 12px 32px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    transition: opacity 0.2s;
    letter-spacing: 1px;
  }
  .btn-enter:hover { opacity: 0.85; }
 
  /* ── LAYOUT PRINCIPAL (GRID COM CHAT) ── */
  .main-layout { 
    display: none; 
    height: calc(100vh - 60px); /* Altura total menos o header */
  }
  .main-layout.visible { 
    display: grid; 
    grid-template-columns: 1fr 350px; /* Área principal e área do chat */
  }
 
  .fichas-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
    padding: 24px;
    overflow-y: auto;
    align-content: start;
  }

  /* ── SIDEBAR (CHAT E DADOS) ── */
  .sidebar {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  
  .dice-roller-area {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }
  
  .dice-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  
  .dice-inputs input {
    width: 50px;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 6px;
    border-radius: 4px;
    text-align: center;
    font-weight: bold;
  }

  .dice-inputs span {
    color: var(--text2);
    font-weight: bold;
  }

  .btn-roll {
    width: 100%;
    background: var(--blue);
    color: white;
    border: none;
    padding: 8px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }

  .btn-roll:hover { background: #3b82f6; }

  .chat-history {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .chat-msg {
    background: var(--bg3);
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    border-left: 3px solid var(--border2);
  }

  .chat-msg.roll {
    border-left-color: var(--purple);
    background: linear-gradient(90deg, rgba(168,85,247,0.1), transparent);
  }

  .chat-msg.mine {
    border-left-color: var(--blue);
  }

  .msg-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--text2);
  }

  .msg-author { font-weight: bold; color: var(--gold); }
  
  .msg-result {
    font-size: 16px;
    font-weight: bold;
    color: var(--purple);
    margin-top: 4px;
  }

  .chat-input-area {
    padding: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .chat-input-area input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px;
    border-radius: 4px;
    outline: none;
  }

  .chat-input-area button {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 0 16px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
  }
 
  /* ── FICHA CARD ── */
  .ficha-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .ficha-card.is-mine {
    border-color: var(--purple);
    box-shadow: 0 0 30px var(--purple-glow);
  }
  .ficha-card.is-mine .card-header { background: linear-gradient(135deg, #1e1030, #16101e); }
 
  .card-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header-left { flex: 1; }
  .char-name {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--gold);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .char-name[contenteditable="true"]:focus {
    outline: 1px solid var(--gold);
    border-radius: 3px;
    padding: 2px 4px;
  }
  .char-meta {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .char-meta span { display: flex; align-items: center; gap: 4px; }
  .char-meta [contenteditable="true"]:focus {
    outline: 1px solid var(--border2);
    border-radius: 3px;
    padding: 1px 4px;
    color: var(--text);
  }
  .player-badge {
    font-size: 11px;
    background: var(--purple-glow);
    border: 1px solid var(--purple);
    color: var(--purple);
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
  }
  .player-badge.other {
    background: rgba(74,158,255,0.1);
    border-color: var(--blue);
    color: var(--blue);
  }
 
  .card-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
 
  /* ── SEÇÃO ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
 
  /* ── BARRAS DE RECURSO ── */
  .resource-bars { display: flex; flex-direction: column; gap: 10px; }
 
  .resource-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .resource-label {
    font-size: 11px;
    font-weight: 600;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .resource-label.pv  { color: var(--red); }
  .resource-label.ea  { color: var(--blue); }
  .resource-label.pvt { color: var(--gold); }
 
  .bar-track {
    flex: 1;
    height: 12px;
    background: var(--bg3);
    border-radius: 6px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-fill.pv  { background: linear-gradient(90deg, #7f1d1d, var(--red)); }
  .bar-fill.ea  { background: linear-gradient(90deg, #1e3a6e, var(--blue)); }
  .bar-fill.pvt { background: linear-gradient(90deg, #78350f, var(--gold)); }
 
  .resource-inputs {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .num-input {
    width: 44px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 3px 4px;
    outline: none;
  }
  .num-input:focus { border-color: var(--border2); }
  .num-sep { color: var(--text2); font-size: 12px; }
 
  /* ── ATRIBUTOS & BOTÃO INICIATIVA ── */
  .attrs-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .attr-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }
  .attr-abbr {
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 1px;
  }
  .attr-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    display: block;
    line-height: 1.2;
  }
  .attr-val[contenteditable="true"]:focus {
    outline: 1px solid var(--border2);
    border-radius: 3px;
  }
  .attr-mod {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  .btn-iniciativa {
    background: var(--purple-glow);
    border: 1px solid var(--purple);
    color: var(--purple);
    padding: 6px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    transition: 0.2s;
  }
  .btn-iniciativa:hover:not(:disabled) {
    background: var(--purple);
    color: white;
  }
  .btn-iniciativa:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
 
  /* ── STATUS EXTRAS ── */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .status-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .status-box .s-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
  .status-box .s-val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    display: block;
    margin-top: 2px;
  }
  .status-box .s-val[contenteditable="true"]:focus {
    outline: 1px solid var(--border2);
    border-radius: 3px;
  }
 
  /* ── TÉCNICAS ── */
  .tecnicas-list { display: flex; flex-direction: column; gap: 6px; }
  .tecnica-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px
